
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Overlap% - Mosayeb Khani</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap');

  body {
    font-family: 'Vazirmatn', sans-serif;
    background: #f0f4f8;
    margin: 0;
    padding: 10px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .content-wrap {
    flex: 1;
  }
  .header-container {
    padding: 5px 0;
    border-bottom: 1px solid #ccc;
    margin-bottom: 10px;
  }
  .header-main {
    text-align: center;
    margin-bottom: 3px;
    font-size: 1.4rem;
    font-weight: 700;
  }
  .author-main {
    text-align: center;
    font-size: 0.7rem;
    margin-bottom: 8px;
    color: #555;
    font-weight: 500;
  }
  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: 10px;
    margin-bottom: 15px;
  }
  .input-group {
    background: white;
    padding: 8px;
    border-radius: 8px;
    text-align: center;
  }
  label {
    display: block;
    margin-bottom: 5px;
    font-size: 0.9rem;
    font-weight: bold;
  }
  input, select {
    width: 100%;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    text-align: right;
  }
  button {
    padding: 12px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #28a745;
    color: white;
    font-weight: bold;
    font-size: 1rem;
    transition: background 0.3s ease;
  }
  button:hover {
    background: #218838;
  }
  #result {
    background: #fff;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
    text-align: center;
    border: 2px solid #0077b6;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10px;
    background: white;
    margin-top: 20px;
  }
  th, td {
    border: 1px solid #ddd;
    padding: 5px;
    text-align: center;
  }
  th {
    background: #0077b6;
    color: white;
    font-size: 0.9rem;
  }
  .red-cell {
    background-color: #f8d7da !important;
    color: #721c24 !important;
    font-weight: bold;
  }
  .action-buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
    justify-content: center;
  }
  .action-buttons button {
    width: auto;
    padding: 8px 15px;
    font-weight: bold;
    border-radius: 6px;
  }
  .share-btn { background: #0077b6; }
  .share-btn:hover { background: #005a8d; }
  .print-btn { background: #6c757d; }
  .print-btn:hover { background: #5a6268; }

  .product-name-unit {
    background: white;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    justify-content: space-between;
  }
  .product-name-unit label {
    margin: 0 5px;
    min-width: 100px;
  }
  .product-name-unit input {
    flex: 1;
    min-width: 150px;
  }
  .product-name-unit select {
    flex: 1;
    min-width: 150px;
    width: auto;
    padding: 8px;
    border: 1px solid #ccc;
    border-radius: 5px;
    box-sizing: border-box;
    text-align: right;
  }

  footer.main-footer {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    font-size: 0.8em;
    color: #555;
    font-family: 'Vazirmatn', sans-serif;
    margin-top: 20px;
    border-top: 1px solid #ccc;
  }

  #printHeader, #printFooter {
    display: none;
  }

  @media print {
    @page {
      margin: 10mm;
      size: A4;
    }
    body {
      margin: 0;
      background: white;
      color: black;
      font-family: 'Vazirmatn', sans-serif;
      font-size: 11px;
    }

    .header-container, footer.main-footer, .controls, .action-buttons {
      display: none !important;
    }

    #printFooter {
      display: flex !important;
      position: fixed;
      bottom: 10mm;
      left: 10mm;
      right: 10mm;
      font-size: 0.8em;
      color: #555;
      justify-content: space-between;
      font-family: 'Vazirmatn', sans-serif;
      background: white;
      padding-top: 5px;
    }

    #tableContainer {
      display: block !important;
      margin-top: 0;
      width: 100%;
    }

    .report-title {
      text-align: center;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 1.05rem;
    }
    .report-title #reportTitle {
      display: block !important;
      margin-bottom: 4px;
      font-size: 1.15rem;
    }
    .report-title .reportDate {
      font-size: 0.95rem;
      color: #555;
      margin-top: 4px;
    }

    #resultsTable {
      display: table !important;
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
    }
    #resultsTable th, #resultsTable td {
      border: 1px solid #000 !important;
      padding: 3px !important;
      background: #fff !important;
      color: #000 !important;
      white-space: nowrap;
      text-align: center;
    }

    #result {
      display: none !important;
    }
  }
</style>
</head>
<body>

<div class="content-wrap">
  <div class="header-container">
    <div class="header-main">محاسبه درصد درگیری (Overlap%)</div>
    <div class="author-main">طراحی و ساخت برنامه: Mosayeb Khani</div>
  </div>

  <div class="controls">
    <div class="product-name-unit">
      <label for="productName">نام محصول</label>
      <select id="productNameSelect">
        <option value="">-- انتخاب کنید --</option>
        <option value="قوطی 400 گرمی ساده/چاپدار">قوطی 400 گرمی ساده/چاپدار</option>
        <option value="قوطی 420 گرمی ساده/چاپدار">قوطی 420 گرمی ساده/چاپدار</option>
        <option value="قوطی 770 گرمی ساده/چاپدار">قوطی 770 گرمی ساده/چاپدار</option>
        <option value="قوطی 800 گرمی ساده/چاپدار">قوطی 800 گرمی ساده/چاپدار</option>
        <option value="قوطی 4000 گرمی ساده/چاپدار">قوطی 4000 گرمی ساده/چاپدار</option>
        <option value="حلب 16 کیلویی ساده/چاپدار">حلب 16 کیلویی ساده/چاپدار</option>
      </select>
      <label for="unitSelect">واحد اندازه‌گیری</label>
      <select id="unitSelect">
        <option value="mil">هزارم اینچ</option>
        <option value="mm">میلیمتر</option>
      </select>
    </div>

    <div class="input-grid">
      <div class="input-group"><label for="length">SL طول دوخت</label><input type="number" id="length" step="0.01" autocomplete="off" /></div>
      <div class="input-group"><label for="seamThickness">ST ضخامت</label><input type="number" id="seamThickness" step="0.01" autocomplete="off" /></div>
      <div class="input-group"><label for="coverHook">CH قلاب در</label><input type="number" id="coverHook" step="0.01" autocomplete="off" /></div>
      <div class="input-group"><label for="bodyHook">BH قلاب بدنه</label><input type="number" id="bodyHook" step="0.01" autocomplete="off" /></div>
      <div class="input-group"><label for="headThickness">Te ضخامت سر</label><input type="number" id="headThickness" step="0.01" autocomplete="off" /></div>
      <div class="input-group"><label for="bodyThickness">Tb ضخامت بدنه</label><input type="number" id="bodyThickness" step="0.01" autocomplete="off" /></div>
    </div>
    <button onclick="calculate()">محاسبه</button>
  </div>

  <div id="result" style="display:none;"></div>

  <div id="tableContainer" style="display:none;">
    <div id="reportTitleContainer" class="report-title">
        <div id="reportTitle"></div>
        <div class="reportDate"></div>
    </div>

    <table id="resultsTable">
      <thead>
        <tr>
          <th>قالب</th>
          <th>sl</th>
          <th>st</th>
          <th>ch</th>
          <th>bh</th>
          <th>te</th>
          <th>tb</th>
          <th>diff</th>
          <th>free</th>
          <th>%ol</th>
          <th>وضعیت</th>
        </tr>
      </thead>
      <tbody>
      </tbody>
    </table>
    <div class="action-buttons">
      <button class="share-btn" onclick="shareAll()">اشتراک‌گذاری</button>
      <button class="print-btn" onclick="printReport()">چاپ گزارش</button>
    </div>
  </div>
</div>

<div id="printFooter" aria-hidden="true" role="contentinfo" class="main-footer">
  <span>Mosayeb Khani - mosayeb872@gmail.com</span>
  <span>انتشار این برنامه مجاز است</span>
</div>

<footer class="main-footer" role="contentinfo">
  <span>Mosayeb Khani - mosayeb872@gmail.com</span>
  <span>انتشار این برنامه مجاز است</span>
</footer>

<script>
  const THRESHOLD_MIL = 7.5;
  const MIL_TO_MM = 0.0254;
  const THRESHOLD_MM = THRESHOLD_MIL * MIL_TO_MM;

  // مقدار حداقل قلاب (70 هزارم اینچ)
  const MIN_HOOK_MIL = 70;
  const MIN_HOOK_MM = MIN_HOOK_MIL * MIL_TO_MM;

  let lastCalculation = null;
  let moldCounter = 0;

  function calculate() {
    const productName = document.getElementById('productNameSelect').value;
    const unit = document.getElementById('unitSelect').value;

    let L = parseFloat(document.getElementById('length').value);
    let ST = parseFloat(document.getElementById('seamThickness').value);
    let CH = parseFloat(document.getElementById('coverHook').value);
    let BH = parseFloat(document.getElementById('bodyHook').value);
    let Te = parseFloat(document.getElementById('headThickness').value);
    let Tb = parseFloat(document.getElementById('bodyThickness').value);

    if (!productName) {
      alert('لطفا نام محصول را از لیست انتخاب کنید.');
      return;
    }
    if ([L, ST, CH, BH, Te, Tb].some(v => isNaN(v))) {
      alert('لطفا تمامی مقادیر را کامل و صحیح وارد کنید.');
      return;
    }

    const selectedProductName = productName;

    const diff = Math.abs(CH - BH);
    const free = ST - (3 * Te + 2 * Tb);

    const numerator = L - (CH + BH + 1.1 * Te);
    const denominator = L - (2.2 * Te + 1.1 * Tb);
    let ol = 0;
    if (denominator !== 0) {
        ol = Math.abs(numerator / denominator) * 100;
    } else if (numerator === 0) {
        ol = 0;
    } else {
        ol = Infinity;
    }

    const thresholdDiff = unit === 'mm' ? THRESHOLD_MM : THRESHOLD_MIL;
    const minHook = unit === 'mm' ? MIN_HOOK_MM : MIN_HOOK_MIL;

    // جمع آوری همه مغایرت ها در آرایه
    let issues = [];
    if (free < 0) {
      issues.push('احتمال بریدگی دوخت');
    }
    if (ol < 45) {
      issues.push('پایین بودن درصد درگیر- احتمال نشتی');
    }
    if (diff > thresholdDiff) {
      issues.push('احتمال چروکیدگی دوخت');
      issues.push('بالا بودن اختلاف قلاب');
    }

    // تفکیک پایین بودن هر قلاب و کلاس رنگی جداگانه
    let chLow = false;
    let bhLow = false;
    if (CH < minHook) {
      issues.push('پایین بودن قلاب در');
      chLow = true;
    }
    if (BH < minHook) {
      issues.push('پایین بودن قلاب بدنه');
      bhLow = true;
    }

    const status = issues.length === 0 ? 'مناسب' : issues.join('، ');

    const tbody = document.querySelector('#resultsTable tbody');
    document.getElementById('tableContainer').style.display = 'block';

    const olClass = (ol < 45 || ol > 75 || ol === Infinity) ? 'red-cell' : '';
    const freeClass = (free < 0) ? 'red-cell' : '';
    const diffClass = (diff > thresholdDiff) ? 'red-cell' : '';
    const chClass = chLow ? 'red-cell' : '';
    const bhClass = bhLow ? 'red-cell' : '';

    moldCounter++;
    const moldId = `P-${moldCounter}`;

    const newRow = document.createElement('tr');
    newRow.innerHTML = `
      <td>${moldId}</td>
      <td>${L.toFixed(2)}</td>
      <td>${ST.toFixed(2)}</td>
      <td class="${chClass}">${CH.toFixed(2)}</td>
      <td class="${bhClass}">${BH.toFixed(2)}</td>
      <td>${Te.toFixed(2)}</td>
      <td>${Tb.toFixed(2)}</td>
      <td class="${diffClass}">${diff.toFixed(2)}</td>
      <td class="${freeClass}">${free.toFixed(2)}</td>
      <td class="${olClass}">${ol === Infinity ? 'نامحدود' : ol.toFixed(1) + '%'}</td>
      <td>${status}</td>
    `;
    tbody.appendChild(newRow);

    lastCalculation = { productName: selectedProductName, ol: ol === Infinity ? 'نامحدود' : ol.toFixed(1) + '%', status };

    const resDiv = document.getElementById('result');
    resDiv.style.display = 'block';
    resDiv.innerHTML = `<strong>نتیجه: ${ol === Infinity ? 'نامحدود' : ol.toFixed(1) + '%'}</strong><br><strong>وضعیت: ${status}</strong>`;

    document.getElementById('length').value = '';
    document.getElementById('seamThickness').value = '';
    document.getElementById('coverHook').value = '';
    document.getElementById('bodyHook').value = '';
    document.getElementById('length').focus();
  }

  async function shareAll() {
    const unit = document.getElementById('unitSelect').value;
    const tbody = document.querySelector('#resultsTable tbody');
    if (tbody.children.length === 0) {
      alert('هیچ داده‌ای برای اشتراک‌گذاری وجود ندارد.');
      return;
    }

    let unitLabel = unit === 'mil' ? 'هزارم اینچ' : 'میلیمتر';
    let text = `گزارش درگیری (Overlap%)\nواحد اندازه‌گیری: ${unitLabel}\n\n`;

    for (let row of tbody.children) {
      const cells = row.cells;
      text += `قالب: ${cells[0].innerText} (محصول: ${lastCalculation.productName}), sl: ${cells[1].innerText}, st: ${cells[2].innerText}, ch: ${cells[3].innerText}, bh: ${cells[4].innerText}, te: ${cells[5].innerText}, tb: ${cells[6].innerText}, diff: ${cells[7].innerText}, free: ${cells[8].innerText}, %ol: ${cells[9].innerText}, وضعیت: ${cells[10].innerText}\n`;
    }

    if (navigator.share) {
      try {
        await navigator.share({
          title: 'گزارش درگیری (Overlap%)',
          text: text
        });
      } catch (err) {
        console.error('Error sharing:', err);
        alert('اشتراک‌گذاری انجام نشد.');
      }
    } else {
      alert('اشتراک‌گذاری از طریق مرورگر پشتیبانی نمی‌شود. متن گزارش:\n\n' + text);
    }
  }

  function getPersianDate() {
    const today = new Date();
    try {
      return new Intl.DateTimeFormat('fa-IR-u-ca-persian', { year: 'numeric', month: 'long', day: 'numeric' }).format(today);
    } catch {
      return today.toLocaleDateString('fa-IR');
    }
  }

  function printReport() {
    if (!lastCalculation) {
      alert('لطفا ابتدا یک محاسبه انجام دهید تا گزارشی برای پرینت وجود داشته باشد.');
      return;
    }

    document.getElementById('reportTitle').textContent = `گزارش محاسبات محصول: ${lastCalculation.productName}`;
    document.querySelector('#reportTitleContainer .reportDate').textContent = `تاریخ گزارش: ${getPersianDate()}`;

    document.getElementById('tableContainer').style.display = 'block';

    window.print();
  }
</script>

</body>
</html>
